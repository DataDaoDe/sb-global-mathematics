id: algebra.group.cyclic
kind: concept
title: Cyclic group

summary: A cyclic group is a group generated by a single element, so every element is an integer power of one generator.

display_math:
  - latex: |
      G=\langle g\rangle
    description: A group generated by the element $g$.

