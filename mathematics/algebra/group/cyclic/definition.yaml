id: algebra.group.cyclic.definition
kind: definition
title: Definition of cyclic group

defines:
  - algebra.group.cyclic

depends_on:
  - algebra.group

statement: |
  A group $G$ is cyclic if there exists an element $g \in G$ such that every element of $G$ is equal to $g^n$ for some integer $n$.

display_math:
  - latex: |
      G=\langle g\rangle=\{g^n\mid n\in\mathbb{Z}\}
    description: A cyclic group generated by $g$.

source_refs:
  - source: source.dummit-foote-abstract-algebra-third-edition
    locator: Section 2.3
    note: Defines cyclic groups and studies groups generated by one element.
