id: algebra.group.cyclic.example.integers-generated-by-one
kind: example
title: The integers are generated by one

example_of:
  - algebra.group.cyclic

description: The additive group $(\mathbb{Z},+)$ is cyclic because every integer is an integer multiple of $1$.

display_math:
  - latex: |
      \mathbb{Z}=\langle 1\rangle=\{n\cdot 1\mid n\in\mathbb{Z}\}
    description: The integers as a cyclic group generated by $1$.

source_refs:
  - source: source.dummit-foote-abstract-algebra-third-edition
    locator: Section 2.3
    note: The infinite cyclic group generated by one element is a fundamental example.
