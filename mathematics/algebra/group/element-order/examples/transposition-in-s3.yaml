id: algebra.group.element-order.example.transposition-in-s3
kind: example
title: A transposition in S3 has order two

example_of:
  - algebra.group.element-order

description: |
  The transposition $(12)$ in $S_3$ has order $2$ because applying it twice gives the identity permutation.

display_math:
  - latex: |
      (12)^2=e
    description: A transposition squared is the identity.

source_refs:
  - source: source.dummit-foote-abstract-algebra-third-edition
    locator: Sections 1.1 and 1.3
    note: Permutations provide concrete examples for computing element orders.
