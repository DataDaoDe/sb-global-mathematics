id: algebra.group.example.cyclic-group-order-three
kind: example
title: The cyclic group of order three

example_of:
  - algebra.group
  - algebra.group.abelian
  - algebra.group.finite
  - algebra.group.cyclic
  - algebra.group.order

description: |
  The group $\mathbb{Z}/3\mathbb{Z}$ under addition modulo $3$ is a finite cyclic group. It is generated by the class $1+3\mathbb{Z}$, and every element is obtained by adding that generator to itself.

display_math:
  - latex: |
      \mathbb{Z}/3\mathbb{Z}=\{0+3\mathbb{Z},1+3\mathbb{Z},2+3\mathbb{Z}\}
    description: The three elements of the cyclic group of order three.
  - latex: |
      \langle 1+3\mathbb{Z}\rangle=\mathbb{Z}/3\mathbb{Z}
    description: The class of $1$ generates the group.

source_refs:
  - source: source.dummit-foote-abstract-algebra-third-edition
    locator: Sections 1.1 and 2.3
    note: Cyclic groups and modular integer groups are standard introductory examples.
