id: algebra.group.finite.proposition.lagrange-theorem
kind: proposition
title: Lagrange's theorem

proposition_type: theorem

claim: |
  If $G$ is a finite group and $H\leq G$, then $|H|$ divides $|G|$ and $|G|=[G:H]|H|$. Equivalently, the size of a finite group is the number of cosets of $H$ multiplied by the size of $H$.

display_math:
  - latex: |
      |G|=[G:H]\,|H|
    description: |
      Lagrange's counting formula: group order equals subgroup index times subgroup order.

depends_on:
