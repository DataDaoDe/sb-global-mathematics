id: algebra.group.generated-subgroup
kind: concept
title: Subgroup generated by a subset

summary: The subgroup generated by a subset is the smallest subgroup containing that subset; equivalently, it contains exactly the group elements forced by closing the subset under the group operation and inverses.

display_math:
  - latex: |
      \langle S\rangle
    description: The subgroup generated by a subset $S$.

defined_by:
  - algebra.group.generated-subgroup.definition

broader_concepts:
