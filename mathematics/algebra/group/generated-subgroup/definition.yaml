id: algebra.group.generated-subgroup.definition
kind: definition
title: Definition of subgroup generated by a subset

defines:
  - algebra.group.generated-subgroup

depends_on:
  - algebra.group.subgroup

statement: |
  Let $S$ be a subset of a group $G$. The subgroup generated by $S$, written $\langle S\rangle$, is the intersection of all subgroups of $G$ that contain $S$. Equivalently, it is the set of all finite products of elements of $S$ and their inverses.

display_math:
  - latex: |
      \langle S\rangle=\bigcap_{\substack{H\leq G\\ S\subseteq H}}H
    description: The smallest subgroup of $G$ containing $S$.
  - latex: |
      \langle S\rangle=\{s_1^{\varepsilon_1}\cdots s_n^{\varepsilon_n}\mid n\geq 0,\ s_i\in S,\ \varepsilon_i\in\{-1,1\}\}
    description: The generated subgroup as finite words in elements of $S$ and their inverses.

source_refs:
  - source: source.dummit-foote-abstract-algebra-third-edition
    locator: Section 2.4
    note: Defines generated subgroups and generated groups.
