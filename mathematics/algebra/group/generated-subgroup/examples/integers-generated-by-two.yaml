id: algebra.group.generated-subgroup.example.integers-generated-by-two
kind: example
title: The subgroup of integers generated by two

example_of:
  - algebra.group.generated-subgroup

description: |
  In the additive group $\mathbb{Z}$, the subgroup generated by $2$ is the set of all even integers. Closing the single element $2$ under addition and additive inverse forces all integer multiples of $2$, and no odd integer is forced.

display_math:
  - latex: |
      \langle 2\rangle=2\mathbb{Z}
    description: The subgroup generated by $2$ in $(\mathbb{Z},+)$.
  - latex: |
      2\mathbb{Z}=\{\ldots,-4,-2,0,2,4,\ldots\}
    description: All integer multiples of $2$.

source_refs:
  - source: source.dummit-foote-abstract-algebra-third-edition
    locator: Section 2.4
    note: Generated subgroups are illustrated by cyclic subgroups and integer examples.
