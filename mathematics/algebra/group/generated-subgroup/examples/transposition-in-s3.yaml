id: algebra.group.generated-subgroup.example.transposition-in-s3
kind: example
title: The subgroup generated by a transposition in S3

example_of:
  - algebra.group.generated-subgroup
  - algebra.group.subgroup

description: |
  In $S_3$, the transposition $(12)$ generates a two-element subgroup. Since $(12)^2=e$, the only elements forced by closing $\{(12)\}$ under composition and inverses are $e$ and $(12)$.

display_math:
  - latex: |
      \langle(12)\rangle=\{e,(12)\}
    description: A generated subgroup inside $S_3$.

source_refs:
  - source: source.dummit-foote-abstract-algebra-third-edition
    locator: Sections 1.3 and 2.4
    note: Permutations give concrete examples of generated subgroups.
