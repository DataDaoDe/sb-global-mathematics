id: algebra.group.history.counting-and-cosets
kind: historical_note
title: Counting finite groups through cosets

date_label: Classical finite group theory

description: |
  A central early insight of finite group theory is that subgroups organize the elements of a finite group into equal-sized cosets. This turns algebraic structure into arithmetic divisibility, with Lagrange's theorem expressing the relationship between the order of a group, the order of a subgroup, and the subgroup's index.

display_math:
  - latex: |
      G=\bigsqcup_{i=1}^{[G:H]} g_iH
    description: A finite group partitioned into cosets of a subgroup.

