id: algebra.group.history.substructures-and-homomorphisms
kind: historical_note
title: Substructures and structure-preserving maps in group theory

date_label: Nineteenth and twentieth century structural algebra
event_type: synthesis
start_year: 1854
end_year: 1930

description: |
  As group theory developed from permutations, equations, and symmetries, mathematicians isolated two complementary ways to study a group: its internal subgroups and the homomorphisms that compare it with other groups. Cayley's abstract finite groups retained permutation groups as a universal representation model, making it natural to ask when different presentations describe the same structure. Kernels and images record how much structure a homomorphism collapses and reaches, while cyclic and permutation groups provide central organizing examples.

