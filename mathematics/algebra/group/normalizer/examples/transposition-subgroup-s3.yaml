id: algebra.group.normalizer.example.transposition-subgroup-s3
kind: example
title: A self-normalizing subgroup of S3

example_of:
  - algebra.group.normalizer

description: |
  Let $H=\langle(12)\rangle$ in $S_3$. The normalizer of $H$ in $S_3$ is $H$ itself. This contrasts with normal subgroups, whose normalizer is the entire ambient group.

display_math:
  - latex: |
      H=\langle(12)\rangle,\qquad N_{S_3}(H)=H
    description: The subgroup generated by a transposition is self-normalizing in $S_3$.

source_refs:
  - source: source.dummit-foote-abstract-algebra-third-edition
    locator: Section 4.3
    note: Normalizers measure which elements preserve a subset under conjugation.
