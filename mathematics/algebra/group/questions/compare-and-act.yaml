id: algebra.group.question.compare-and-act
kind: question
title: When are groups the same, and how do groups act on objects?

asks: |
  How can one recognize when two groups have the same structure, understand the self-symmetries of a group, form new groups by collapsing normal subgroups, and study groups through their actions on sets?

display_math:
  - latex: |
      G\cong H,\qquad \operatorname{Aut}(G),\qquad G/N,\qquad G\curvearrowright X,\qquad G\hookrightarrow S_G
    description: Isomorphisms, automorphisms, quotients, actions, and permutation representations as structural tools.

