id: algebra.group.question.compare-and-act
kind: question
title: When are groups the same, and how do groups act on objects?

asks: |
  How can one recognize when two groups have the same structure, form new groups by collapsing normal subgroups, and study groups through their actions on sets?

display_math:
  - latex: |
      G\cong H,\qquad G/N,\qquad G\curvearrowright X,\qquad G\cdot x,\qquad G_x
    description: Isomorphisms, quotients, actions, orbits, and stabilizers as structural tools.

