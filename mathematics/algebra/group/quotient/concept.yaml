id: algebra.group.quotient
kind: concept
title: Quotient group

summary: A quotient group is formed by replacing elements of a group with cosets of a normal subgroup, thereby collapsing that normal subgroup to the identity while retaining a well-defined group operation on the resulting classes.

display_math:
  - latex: |
      G/N
    description: The quotient group of $G$ by a normal subgroup $N$.

defined_by:
