id: algebra.group.quotient
kind: concept
title: Quotient group

summary: A quotient group is the group formed from the cosets of a normal subgroup, collapsing that normal subgroup to the identity.

display_math:
  - latex: |
      G/N
    description: The quotient group of $G$ by a normal subgroup $N$.

