id: category-theory.category.history.eilenberg-mac-lane-natural-equivalences
kind: historical_note
title: Categories from natural equivalences

date_label: Eilenberg and Mac Lane's 1945 paper
event_type: publication
start_year: 1945
end_year: 1945

description: |
  Eilenberg and Mac Lane introduced categories, functors, and natural transformations to make precise a recurring phenomenon: mathematical constructions often correspond not by arbitrary isomorphisms, but by transformations that are compatible with every relevant map. Category theory began as language for this compatibility.

summary: Categories, functors, and natural transformations were introduced to formalize natural equivalence between mathematical constructions.

prior_formulation: Mathematicians used many structure-preserving maps and isomorphisms, but lacked a general language for transformations between constructions.

conceptual_change: Objects and maps became organized into categories, constructions became functors, and compatibility between constructions became natural transformation.

resulting_formulation: Category theory studies objects through morphisms, functors between categories, and natural transformations between functors.

enabled_developments:
  - Algebraic topology could compare constructions functorially.
  - Universal constructions and diagrammatic reasoning became reusable across fields.

