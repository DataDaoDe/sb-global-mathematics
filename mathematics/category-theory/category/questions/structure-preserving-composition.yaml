id: category-theory.category.question.structure-preserving-composition
kind: question
title: What remains when we focus on structure-preserving maps?

asks: |
  Across sets, groups, rings, spaces, and other mathematical systems, what common structure remains if we focus on objects, structure-preserving maps, and how those maps compose?

display_math:
  - latex: |
      A\xrightarrow{f}B\xrightarrow{g}C
      \quad\leadsto\quad
      g\circ f
    description: The recurring pattern of composable structure-preserving maps.

