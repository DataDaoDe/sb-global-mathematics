description: |
  Epimorphisms reformulate surjective behavior as right cancellation, a condition stated entirely in terms of composition.

summary: Epimorphisms generalize surjective functions by right cancellation.

conceptual_change: |
  Onto-like behavior could be detected by whether postcomposition after the map distinguishes morphisms.

