id: category-theory.epimorphism.question.onto-like-maps
kind: question
title: What makes a map onto-like?

asks: |
  Which categorical property captures the idea that a map supplies enough inputs to determine all maps out of its codomain?

display_math:
  - latex: |
      u\circ e=v\circ e\Rightarrow u=v
    description: Cancellation as the categorical test for being onto-like.

