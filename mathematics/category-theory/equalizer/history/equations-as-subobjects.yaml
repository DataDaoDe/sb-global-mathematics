id: category-theory.equalizer.history.equations-as-subobjects
kind: historical_note
title: Equations as universal subobjects

date_label: Mid-twentieth-century category theory
event_type: generalization
start_year: 1945

description: |
  Equalizers turned the solution set of an equation between maps into a categorical construction.

summary: Equalizers generalize subsets where two maps agree.

conceptual_change: |
  Solving an equation became a universal mapping problem: identify the largest domain through which all equalizing maps factor.

