id: category-theory.exponential-object.question.function-sets-structurally
kind: question
title: What makes a function set?

asks: |
  How can a category recognize the set of all maps from $A$ to $B$ without first listing its elements?

display_math:
  - latex: |
      X\times A\to B
    description: Families of maps from $A$ to $B$ parameterized by $X$.

