description: |
  Finite colimits group the categorical constructions that build finite alternatives and finite quotients.

summary: Finite colimits supply empty-object and disjoint-sum structure for categorical set theory.

conceptual_change: |
  Empty sets and disjoint unions were seen as instances of a finite colimit principle, dual to finite limits.

