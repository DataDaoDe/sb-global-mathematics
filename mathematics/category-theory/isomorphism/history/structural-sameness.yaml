id: category-theory.isomorphism.history.structural-sameness
kind: historical_note
title: Isomorphism as structural sameness

date_label: Modern structural mathematics
event_type: synthesis
start_year: 1945

description: |
  Category theory made isomorphism the general expression of sameness appropriate to a mathematical context.

summary: Isomorphisms identify objects up to reversible structure-preserving transformation.

conceptual_change: |
  Instead of relying on equality of underlying presentations, category theory compared objects by invertible morphisms.

display_math:
  - latex: |
      A\cong B
    description: Isomorphic objects.

