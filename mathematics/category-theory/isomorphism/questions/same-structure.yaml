id: category-theory.isomorphism.question.same-structure
kind: question
title: When are two objects the same structurally?

asks: |
  What does it mean for two objects in a category to differ only by reversible renaming?

display_math:
  - latex: |
      A\xrightarrow{\sim}B
    description: Isomorphism as reversible structure-preserving map.

