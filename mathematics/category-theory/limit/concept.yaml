id: category-theory.limit
kind: concept
title: Limit

summary: A limit is a universal cone to a diagram, representing the most efficient object satisfying all compatibility conditions of that diagram.

display_math:
  - latex: |
      \lim D
    description: Limit of a diagram $D$.

