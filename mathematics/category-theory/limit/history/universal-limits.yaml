id: category-theory.limit.history.universal-limits
kind: historical_note
title: Limits unify compatibility constructions

date_label: General category theory
event_type: synthesis
start_year: 1945

description: |
  Limit theory unified many familiar constructions by treating each as a universal cone to a diagram.

summary: Limits provide one language for products, equalizers, pullbacks, and related constructions.

conceptual_change: |
  Instead of learning each construction separately, mathematicians could recognize the same universal pattern across diagrams.

display_math:
  - latex: |
      \text{terminal cone}\quad\leadsto\quad\text{limit}
    description: Limit as a terminal cone.

subjects:
  - category-theory.limit

developed_from:
