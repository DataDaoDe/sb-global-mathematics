id: category-theory.product.history.products-as-universal-constructions
kind: historical_note
title: Products as universal constructions

date_label: Mid-twentieth-century category theory
event_type: generalization
start_year: 1945

description: |
  Category theory generalized Cartesian products by identifying the projection-and-pairing property that products satisfy.

summary: Products became objects defined by their universal mapping property.

conceptual_change: |
  The important structure of a product was no longer its elementwise construction, but the unique way maps into its factors combine.

display_math:
  - latex: |
      \mathrm{Hom}(X,A\times B)\cong \mathrm{Hom}(X,A)\times\mathrm{Hom}(X,B)
    description: Product represented by a natural bijection of hom-sets.

subjects:
  - category-theory.product

developed_from:
  - foundations.cartesian-product
  - category-theory.category

source_refs:
  - source: source.leinster-basic-category-theory
    locator: Section 5.1
    note: Products are core examples of universal properties.
