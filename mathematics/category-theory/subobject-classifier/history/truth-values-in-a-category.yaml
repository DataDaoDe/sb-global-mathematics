title: Truth values as a categorical object

date_label: Elementary topos theory
event_type: synthesis
start_year: 1964

description: |
  Subobject classifiers internalized the idea that subsets are classified by predicates with truth values.

summary: Subobject classifiers make truth values part of categorical structure.

conceptual_change: |
  Predicates became morphisms to a classifier object, and subsets became pullbacks of the truth morphism.

