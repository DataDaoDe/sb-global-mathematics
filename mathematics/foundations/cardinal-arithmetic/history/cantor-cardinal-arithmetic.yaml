title: Arithmetic of transfinite cardinal numbers

date_label: Late nineteenth century
event_type: generalization
start_year: 1890

description: |
  Cantor's theory of transfinite cardinal numbers made it possible to add, multiply, and exponentiate infinite sizes.

summary: Cardinal arithmetic generalized finite arithmetic to set sizes.

conceptual_change: |
  Operations on numbers were reinterpreted through operations on sets, which exposed new behavior for infinite cardinalities.

