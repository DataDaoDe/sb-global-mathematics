id: foundations.cardinal-arithmetic.question.how-do-sizes-combine
kind: question
title: How do sizes combine?

asks: |
  Once set size is represented by cardinal numbers, what operations on sets should define addition, multiplication, and exponentiation of sizes?

display_math:
