id: foundations.chain
kind: concept
title: Chain

summary: A chain in a partially ordered set is a subset whose elements are pairwise comparable.

display_math:
  - latex: |
      \forall a,b\in C,\ a\leq b\vee b\leq a
    description: Pairwise comparability inside a chain.

