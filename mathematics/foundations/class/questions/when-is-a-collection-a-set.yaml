id: foundations.class.question.when-is-a-collection-a-set
kind: question
title: When is a collection a set?

asks: |
  Which definable collections can be treated as sets, and which must remain proper classes?

display_math:
  - latex: |
      \{x:P(x)\}
    description: A property-defined collection.

motivates:
  - foundations.class
  - foundations.proper-class

