id: foundations.deduction.proposition.hypothetical-syllogism-valid.proof.semantic-case-analysis
kind: proof
title: Semantic proof of hypothetical syllogism

proves:
  - foundations.deduction.proposition.hypothetical-syllogism-valid

method: semantic case analysis

argument: |
  Assume $P\Rightarrow Q$ and $Q\Rightarrow R$ are true. To show $P\Rightarrow R$, consider a case in which $P$ is true. Since $P\Rightarrow Q$ is true, $Q$ must be true. Since $Q\Rightarrow R$ is true, $R$ must be true. Thus whenever $P$ is true, $R$ is true, so $P\Rightarrow R$ is true. Therefore no valuation makes the premises true and the conclusion false.

display_math:
  - latex: |
      P\Rightarrow Q,\quad Q\Rightarrow R,\quad P
      \quad\Longrightarrow\quad Q\quad\Longrightarrow\quad R
    description: Conditional chaining from $P$ to $R$ through $Q$.

depends_on:
  - foundations.deduction.proposition.hypothetical-syllogism-valid
  - foundations.deduction.proposition.modus-ponens-valid
  - foundations.logical-validity
  - foundations.conditional-statement

source_refs:
  - source: source.velleman-how-to-prove-it-third-edition
    locator: Chapter 1
    note: Semantic validity can be shown by ruling out true premises with false conclusion.
