id: foundations.empty-set.history.empty-set-axiom
kind: historical_note
title: Empty set as a basic set

date_label: Early axiomatic set theory
event_type: formalization
start_year: 1908

description: |
  Axiomatic set theory treats the empty collection as a set whose existence is guaranteed directly or follows from other set-existence axioms.

summary: The empty set became a basic object in formal set theory.

conceptual_change: |
  The absence of elements was made into a legitimate set-theoretic object, allowing constructions such as subsets, functions, and recursive definitions to have base cases.

display_math:
  - latex: |
      \exists E\,\forall x\,(x\notin E)
    description: Existence of an empty set.

subjects:
  - foundations.empty-set

developed_from:
  - foundations.set

source_refs:
  - source: source.zermelo-1908-grundlagen-mengenlehre
    locator: Axiom II
    note: Zermelo included elementary set-existence principles for empty and small sets.
  - source: source.jech-set-theory-third-millennium
    locator: Chapter 1
    note: Modern formulations commonly isolate empty set existence.
