id: foundations.finite-set.question.how-can-we-tell-a-set-is-finite
kind: question
title: How can we tell whether a set is finite?

asks: |
  What distinguishes a set that can be exhausted by counting from a set that cannot?

display_math:
  - latex: |
      |A|=n\quad\text{or}\quad A\text{ is not finite}
    description: The finite/infinite distinction by cardinality.

