id: foundations.least-element.definition
kind: definition
title: Definition of least element

defines:
  - foundations.least-element

depends_on:
  - foundations.partial-order
  - foundations.lower-bound
  - foundations.universal-quantifier

statement: |
  Let $(P,\leq)$ be a partially ordered set and let $A\subseteq P$. A least element of $A$ is an element $m\in A$ such that $m\leq a$ for every $a\in A$.

display_math:
  - latex: |
      m\in A,\qquad \forall a\in A,\ m\leq a
    description: Least element of $A$.

source_refs:
  - source: source.jech-set-theory-third-millennium
    locator: Chapter 1
    note: Least elements are central to well-ordering.
