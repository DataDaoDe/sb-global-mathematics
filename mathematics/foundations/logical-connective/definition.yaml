id: foundations.logical-connective.definition
kind: definition
title: Definition of logical connective

defines:
  - foundations.logical-connective

depends_on:
  - foundations.proposition
  - foundations.truth-value

statement: |
  A logical connective is an operation on propositions whose truth value is determined by the truth values of its input propositions. Negation, conjunction, disjunction, implication, and biconditional are the standard connectives of elementary classical logic.

display_math:
  - latex: |
      P,\ Q\quad\leadsto\quad
      \neg P,\ P\wedge Q,\ P\vee Q,\ P\Rightarrow Q,\ P\Leftrightarrow Q
    description: Compound propositions formed from simpler propositions.

source_refs:
  - source: source.velleman-how-to-prove-it-third-edition
    locator: Chapter 1
    note: Connectives are introduced through their truth tables.
