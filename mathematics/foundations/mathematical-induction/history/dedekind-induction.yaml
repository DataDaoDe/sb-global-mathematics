id: foundations.mathematical-induction.history.dedekind-induction
kind: historical_note
title: Induction as a principle of the natural numbers

date_label: Dedekind's foundational account of number
event_type: formalization
start_year: 1888

description: |
  Inductive reasoning appeared in mathematical practice before modern foundations, but nineteenth-century work on the natural numbers made the principle explicit. Dedekind analyzed natural numbers through a simply infinite system with a successor operation, giving induction a structural role: a property that contains the initial element and is closed under successor contains all natural numbers.

summary: Dedekind's account made induction part of the structural characterization of the natural numbers.

prior_formulation: Induction was used as a reasoning pattern over counting numbers before being isolated as a foundational principle.

conceptual_change: Induction became a structural closure principle tied to the successor operation on natural numbers.

resulting_formulation: Modern foundations treat induction as a proof principle or axiom schema governing all natural numbers.

enabled_developments:
  - Recursive definitions and inductive proofs could be justified from the structure of natural numbers.
  - Arithmetic theorems could be proved by base case and successor step.
  - Later formal systems could express induction as axioms or schemas.

display_math:
  - latex: |
      0\in S,\quad n\in S\Rightarrow n+1\in S
      \quad\Longrightarrow\quad \mathbb{N}\subseteq S
    description: Induction as closure under the successor operation.

