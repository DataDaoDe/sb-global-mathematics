id: foundations.mathematical-logic.history.formal-deduction-and-semantics
kind: historical_note
title: Formal deduction and semantic consequence

date_label: Early twentieth-century formal logic
event_type: formalization
start_year: 1920
end_year: 1930

description: |
  Modern mathematical logic separated syntactic derivability from semantic consequence, making questions such as soundness precise: formal proofs should preserve truth in every intended interpretation.

summary: Twentieth-century logic distinguished formal derivability from semantic consequence.

prior_formulation: Valid reasoning and proof were often discussed together without a fully explicit separation between formal derivation and truth in interpretations.

conceptual_change: Logic separated proof-theoretic derivability, written $\Gamma\vdash\varphi$, from semantic consequence, written $\Gamma\models\varphi$.

resulting_formulation: Soundness and completeness became precise metatheoretic questions connecting formal systems with their semantics.

enabled_developments:
  - Soundness could be stated as derivability implying semantic consequence.
  - Completeness and incompleteness results could compare provability with truth.

display_math:
  - latex: |
      \Gamma \vdash \varphi \quad\text{and}\quad \Gamma \models \varphi
    description: The modern distinction between proof-theoretic and semantic consequence.

