id: foundations.mathematical-logic.history.goedel-incompleteness
kind: historical_note
title: Gödel's incompleteness theorem

date_label: Limits of formal arithmetic
event_type: publication
start_year: 1931

description: |
  Gödel proved that sufficiently strong consistent formal systems capable of expressing arithmetic cannot prove every arithmetical truth expressible in their language. This did not contradict the completeness of first-order logic; it showed that formal theories strong enough for arithmetic have internal limits.

summary: Gödel showed that strong formal arithmetic theories cannot capture all arithmetical truth by proof.

prior_formulation: Completeness for first-order logic showed that logical validities are formally derivable, leaving open what happens inside strong mathematical theories.

conceptual_change: Provability inside a formal theory was separated from truth about arithmetic.

resulting_formulation: A sufficiently strong consistent formal theory has sentences that are not decidable within the theory.

enabled_developments:
  - Metamathematics had to distinguish completeness of a logic from completeness of a theory.
  - Formal systems could be studied through arithmetization of syntax.

display_math:
  - latex: |
      T\nvdash G_T
    description: A schematic Gödel sentence not provable in a suitable consistent theory $T$.

