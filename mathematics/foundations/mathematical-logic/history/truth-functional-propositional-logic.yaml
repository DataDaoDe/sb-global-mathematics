id: foundations.mathematical-logic.history.truth-functional-propositional-logic
kind: historical_note
title: Truth-functional propositional logic

date_label: Modern truth-table treatment
event_type: formalization
start_year: 1879
end_year: 1930

description: |
  Modern propositional logic separates a statement's internal subject matter from the way its truth value combines with other statements. Frege's formal language, later textbook presentations of propositional calculi, and truth-table methods made connectives such as negation, conjunction, disjunction, implication, and biconditional precise enough to test tautology, contradiction, validity, and equivalence mechanically.

summary: Propositional logic made compound statements analyzable by truth values and truth tables.

prior_formulation: Valid reasoning had been classified by argument patterns, but compound statement forms were not yet treated with uniform truth-functional tables.

conceptual_change: Logical connectives were treated as operations whose meanings are fixed by their effects on truth values.

resulting_formulation: Truth tables provide a finite method for evaluating propositional formulas, tautologies, contradictions, and logical equivalences.

enabled_developments:
  - Argument forms could be tested by checking all truth-value assignments.
  - Later first-order logic could separate propositional connectives from quantifier structure.

display_math:
  - latex: |
      v(\varphi)\in\{T,F\}
      \quad\leadsto\quad
      v(\neg\varphi),\ v(\varphi\wedge\psi),\ v(\varphi\vee\psi)
    description: Truth-functional evaluation of compound formulas.

