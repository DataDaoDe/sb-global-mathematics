id: foundations.mathematical-logic.question.distinguish-proof-from-truth
kind: question
title: What is the difference between proof and truth?

asks: |
  When should formal provability be distinguished from truth in every intended interpretation?

display_math:
  - latex: |
      \Gamma\vdash\varphi \quad\text{versus}\quad \Gamma\models\varphi
    description: Comparing formal derivability with semantic consequence.

