id: foundations.mathematical-logic.question.express-general-claims
kind: question
title: How can logic express general mathematical claims?

asks: |
  How can a formal language express statements involving all objects, some objects, and relations among variables?

display_math:
  - latex: |
      \forall x\,\exists y\,R(x,y)
    description: Quantifiers express generality and existence in a formal language.

