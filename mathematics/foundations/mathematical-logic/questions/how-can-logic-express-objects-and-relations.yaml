id: foundations.mathematical-logic.question.how-can-logic-express-objects-and-relations
kind: question
title: How can logic express objects and relations?

asks: |
  How can a formal language talk about objects, functions, relations, and general claims about all or some objects?

display_math:
  - latex: |
      \forall x\,\exists y\,R(x,y)
    description: A first-order pattern expressing a general relational claim.

