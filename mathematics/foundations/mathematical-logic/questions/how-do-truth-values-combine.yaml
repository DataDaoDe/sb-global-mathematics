id: foundations.mathematical-logic.question.how-do-truth-values-combine
kind: question
title: How do truth values combine?

asks: |
  Given propositions with truth values, how do logical connectives determine the truth value of a compound proposition?

display_math:
  - latex: |
      P,\ Q\quad\leadsto\quad
      \neg P,\ P\wedge Q,\ P\vee Q,\ P\Rightarrow Q,\ P\Leftrightarrow Q
    description: Building compound propositions from simpler propositions.

