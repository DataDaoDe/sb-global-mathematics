id: foundations.mathematical-logic.question.what-are-limits-of-formal-systems
kind: question
title: What are the limits of formal systems?

asks: |
  Are there mathematical truths that cannot be proved inside a given formal system, even when the system is strong enough to express arithmetic?

display_math:
  - latex: |
      \text{true}_T(\varphi)\ \nRightarrow\ T\vdash\varphi
    description: A schematic contrast between truth and provability in a theory.

