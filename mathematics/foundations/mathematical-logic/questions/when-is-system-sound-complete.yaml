    locator: First edition
    note: Hilbert and Ackermann formulate completeness as a central metatheoretic question for first-order logic.
  - source: source.goedel-1930-completeness
    locator: 1930 paper
    note: Gödel answers the completeness question affirmatively for first-order logic.
