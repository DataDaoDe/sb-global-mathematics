id: foundations.mathematical-logic.question.when-is-system-sound-complete
kind: question
title: When does a proof system match its semantics?

asks: |
  Under what conditions does a formal proof system prove only valid conclusions, and prove every valid conclusion of its language?

display_math:
  - latex: |
      \Gamma\vdash\varphi \Rightarrow \Gamma\models\varphi,
      \qquad
      \Gamma\models\varphi \Rightarrow \Gamma\vdash\varphi
    description: Soundness and completeness as two directions connecting proof and semantics.

