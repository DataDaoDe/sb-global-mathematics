id: foundations.natural-number.definition
kind: definition
title: Definition of natural number

defines:
  - foundations.natural-number

depends_on:
  - foundations.set
  - foundations.function

statement: |
  The natural numbers are the elements of a counting system generated from an initial element by repeatedly applying a successor operation, with no repetitions and with induction holding for successor-closed properties.

display_math:
  - latex: |
      0,\quad S(0),\quad S(S(0)),\quad S(S(S(0))),\ldots
    description: Natural numbers generated by iterating successor.

source_refs:
  - source: source.dedekind-1888-was-sind-zahlen
    locator: 1888 monograph
    note: Dedekind characterizes natural numbers through simply infinite systems and successor.
