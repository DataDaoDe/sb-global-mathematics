id: foundations.preimage.definition
kind: definition
title: Definition of preimage

defines:
  - foundations.preimage

depends_on:
  - foundations.function
  - foundations.set

statement: |
  If $f:X\to Y$ is a function and $B\subseteq Y$, the preimage of $B$ under $f$ is the set of all $x\in X$ such that $f(x)\in B$.

display_math:
  - latex: |
      f^{-1}(B)=\{x\in X:f(x)\in B\}
    description: Preimage of a subset under a function.

source_refs:
  - source: source.dummit-foote-abstract-algebra-third-edition
    locator: Section 0.1
    note: Preimages of subsets under functions are standard set-theoretic notation.
