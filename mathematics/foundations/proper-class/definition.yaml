id: foundations.proper-class.definition
kind: definition
title: Definition of proper class

definition_style: formal
scope: Set-theoretic discourse

defines:
  - foundations.proper-class

depends_on:
  - foundations.class
  - foundations.set

statement: |
  A proper class is a class that is not a set. Proper classes can be discussed externally, but they are not elements of other classes in ordinary ZF set theory.

display_math:
  - latex: |
      C\text{ proper}\iff C\text{ is a class and }C\text{ is not a set}
    description: Proper class as a non-set class.

source_refs:
  - source: source.jech-set-theory-third-millennium
    locator: Chapter 1
    note: The set/class distinction is standard in modern set-theoretic discourse.
