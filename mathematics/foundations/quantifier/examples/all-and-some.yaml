id: foundations.quantifier.example.all-and-some
kind: example
title: Universal and existential quantifiers

example_of:
  - foundations.quantifier
  - foundations.universal-quantifier
  - foundations.existential-quantifier

description: |
  In the natural numbers, $\forall x\,(x=x)$ is true because every object equals itself, and $\exists x\,(x<1)$ is true because $0<1$.

display_math:
  - latex: |
      \mathbb{N}\models\forall x\,(x=x),
      \qquad
      \mathbb{N}\models\exists x\,(x<1)
    description: Universal and existential statements true in $\mathbb{N}$.

source_refs:
  - source: source.enderton-mathematical-introduction-to-logic-second-edition
    locator: Section 2.2
    note: Quantified formulas are evaluated over the domain of a structure.
