id: foundations.quotient-set.example.integers-mod-three
kind: example
title: Integers modulo three as a quotient set

example_of:
  - foundations.quotient-set
  - foundations.equivalence-relation

description: |
  Congruence modulo $3$ partitions the integers into three equivalence classes. The quotient set records only the remainder class of an integer, not the integer itself.

display_math:
  - latex: |
      \mathbb{Z}/{\equiv_3}=\{3\mathbb{Z},\,1+3\mathbb{Z},\,2+3\mathbb{Z}\}
    description: The three congruence classes modulo $3$.

source_refs:
  - source: source.dummit-foote-abstract-algebra-third-edition
    locator: Section 0.1
    note: Congruence classes modulo an integer are standard quotient-set examples.
