id: foundations.reflexive-closure.definition
kind: definition
title: Definition of reflexive closure

defines:
  - foundations.reflexive-closure

depends_on:
  - foundations.relation
  - foundations.reflexive-relation
  - foundations.identity-relation
  - foundations.set-union

statement: |
  For a relation $R$ on $X$, the reflexive closure of $R$ is the smallest reflexive relation on $X$ that contains $R$; it is obtained by adjoining all diagonal pairs.

display_math:
  - latex: |
      R_{\mathrm{ref}}=R\cup\Delta_X
    description: Add identity pairs to make a relation reflexive.

source_refs:
  - source: source.enderton-mathematical-introduction-to-logic-second-edition
    locator: Section 2.2
    note: Closures of relations are standard set-theoretic constructions.
