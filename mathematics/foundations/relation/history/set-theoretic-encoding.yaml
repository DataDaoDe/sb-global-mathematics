id: foundations.relation.history.set-theoretic-encoding
kind: historical_note
title: Set-theoretic encoding of functions and relations

date_label: Modern set-theoretic foundations

description: |
  Modern mathematics often represents structured data using ordered pairs, Cartesian products, and subsets of products. Equivalence relations then make controlled identification precise: instead of saying informally that two objects should count as the same, one forms equivalence classes and quotient sets. Injective, surjective, and bijective functions refine how sets correspond to one another. This language makes relations and functions precise enough to support later constructions such as quotient groups, permutations, group actions, and isomorphisms.

