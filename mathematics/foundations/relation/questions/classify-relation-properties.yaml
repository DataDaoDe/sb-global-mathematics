id: foundations.relation.question.classify-relation-properties
kind: question
title: Which laws can a relation satisfy?

asks: |
  Once a relation is encoded as a set of ordered pairs, which structural laws determine whether it behaves like equality, a strict comparison, a preorder, a partial order, a total order, or a well-order?

display_math:
  - latex: |
      xRx,\qquad xRy\Rightarrow yRx,\qquad
      xRy\wedge yRz\Rightarrow xRz
    description: Typical laws used to classify binary relations.

