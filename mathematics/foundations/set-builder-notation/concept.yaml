id: foundations.set-builder-notation
kind: concept
title: Set-builder notation

summary: Set-builder notation describes a set by specifying a source set and a condition that its elements must satisfy.

display_math:
  - latex: |
      \{x\in A:P(x)\}
    description: Elements of $A$ satisfying predicate $P$.

