id: foundations.set-builder-notation.history.restricted-comprehension
kind: historical_note
title: Restricted comprehension and set-builder notation

date_label: "1908"
event_type: formalization
start_year: 1908

description: |
  After paradoxes from unrestricted comprehension, set-builder notation in axiomatic set theory was understood as forming subsets of already available sets.

summary: Set-builder notation became tied to restricted comprehension.

conceptual_change: |
  A condition alone was no longer treated as enough to create a set; a bounding set became part of the legitimate construction.

display_math:
  - latex: |
      \{x\in A:\varphi(x)\}
    description: Separation from a prior set $A$.

subjects:
  - foundations.set-builder-notation

developed_from:
  - foundations.unrestricted-comprehension

source_refs:
  - source: source.zermelo-1908-grundlagen-mengenlehre
    locator: Axiom III
    note: Separation restricts comprehension to subsets of a given set.
  - source: source.russell-1903-principles-of-mathematics
    locator: Chapter X
    note: Russell's paradox motivated restrictions on naive comprehension.
