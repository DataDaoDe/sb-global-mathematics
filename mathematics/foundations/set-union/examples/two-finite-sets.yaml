id: foundations.set-union.example.two-finite-sets
kind: example
title: Union of two finite sets

example_of:
  - foundations.set-union

description: |
  The union of $\{1,2\}$ and $\{2,3\}$ is $\{1,2,3\}$. The repeated element $2$ appears only once in the resulting set.

display_math:
  - latex: |
      \{1,2\}\cup\{2,3\}=\{1,2,3\}
    description: Union of overlapping finite sets.

source_refs:
  - source: source.dummit-foote-abstract-algebra-third-edition
    locator: Section 0.1
    note: Finite sets illustrate union directly.
