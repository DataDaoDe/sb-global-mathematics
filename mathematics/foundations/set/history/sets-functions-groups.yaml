id: foundations.set.history.sets-functions-groups
kind: historical_note
title: From collections and mappings to abstract groups

date_label: Nineteenth and twentieth century abstraction

description: Modern algebra relies on the language of sets and functions to state structural definitions precisely. The abstract definition of a group packages a set together with a binary operation satisfying axioms that capture reversible composition, a viewpoint shaped by earlier work with permutations, equations, and symmetries.

