id: foundations.set.history.sets-functions-groups
kind: historical_note
title: From collections and mappings to abstract groups

date_label: Nineteenth and twentieth century abstraction
event_type: synthesis
start_year: 1854
end_year: 1930

description: |
  Modern algebra relies on the language of sets and functions to state structural definitions precisely. Cayley's finite groups showed how an abstract operation could be studied independently of a particular numerical system while remaining representable by permutations. Dedekind's foundational work on systems and mappings helped normalize the idea that collections and structure-preserving maps could themselves be primary mathematical objects. The abstract definition of a group packages a set together with a binary operation satisfying axioms that capture reversible composition, a viewpoint shaped by earlier work with permutations, equations, and symmetries.

