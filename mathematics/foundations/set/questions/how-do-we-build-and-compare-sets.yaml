id: foundations.set.question.how-do-we-build-and-compare-sets
kind: question
title: How do we build and compare sets?

asks: |
  Once sets and membership are available, which operations let us form new sets, track elements through functions, split sets into parts, and compare sizes?

display_math:
  - latex: |
      A\subseteq B,\quad A\cup B,\quad A\cap B,\quad
      f(A),\quad f^{-1}(B),\quad |A|
    description: Basic set operations, function images, preimages, and cardinality.

