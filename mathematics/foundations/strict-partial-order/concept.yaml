id: foundations.strict-partial-order
kind: concept
title: Strict partial order

summary: A strict partial order is an irreflexive and transitive relation.

display_math:
  - latex: |
      \neg xRx,\qquad xRy\wedge yRz\Rightarrow xRz
    description: Irreflexivity and transitivity.

