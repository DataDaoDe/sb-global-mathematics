id: foundations.tautology.proposition.excluded-middle.proof.truth-table
kind: proof
title: Truth-table proof of excluded middle

proves:
  - foundations.tautology.proposition.excluded-middle

method: truth table

argument: |
  If $P$ is true, then the disjunction $P\vee\neg P$ is true because its left disjunct is true. If $P$ is false, then $\neg P$ is true, so the disjunction is again true. Thus $P\vee\neg P$ is true under every valuation, so it is a tautology.

steps:
  - label: Check the true case
    statement: |
      If $P$ is true, then $P\vee\neg P$ is true.
    justification: |
      A disjunction is true when at least one disjunct is true.
    depends_on:
      - foundations.disjunction

  - label: Check the false case
    statement: |
      If $P$ is false, then $\neg P$ is true, so $P\vee\neg P$ is true.
    justification: |
      Negation reverses the truth value of $P$, and disjunction is true when the right disjunct is true.
    depends_on:
      - foundations.negation
      - foundations.disjunction

  - label: Conclude tautology
    statement: |
      The formula $P\vee\neg P$ is true on every row of its truth table.
    justification: |
      A tautology is a formula true under every truth assignment.
    depends_on:
      - foundations.tautology
      - foundations.truth-table
      - foundations.tautology.proposition.excluded-middle

display_math:
  - latex: |
      \begin{array}{c|c|c}
      P&\neg P&P\vee\neg P\\
      T&F&T\\
      F&T&T
      \end{array}
    description: Truth table showing excluded middle is always true.

depends_on:
  - foundations.tautology.proposition.excluded-middle
  - foundations.tautology
  - foundations.disjunction
  - foundations.negation
  - foundations.truth-table

source_refs:
  - source: source.enderton-mathematical-introduction-to-logic-second-edition
    locator: Section 1.2
    note: Tautologies are propositional formulas true under every truth assignment.
