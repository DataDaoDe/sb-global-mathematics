id: foundations.unordered-pair.example.two-and-one
kind: example
title: Order does not matter in an unordered pair

example_of:
  - foundations.unordered-pair

description: |
  The unordered pairs $\{1,2\}$ and $\{2,1\}$ are equal because they contain the same two elements.

display_math:
