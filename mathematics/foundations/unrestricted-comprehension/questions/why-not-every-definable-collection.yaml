id: foundations.unrestricted-comprehension.question.why-not-every-definable-collection
kind: question
title: Why not every definable collection?

asks: |
  Why can a property such as $x\notin x$ not automatically determine a set of all objects satisfying that property?

display_math:
  - latex: |
      \{x:x\notin x\}\ ?
    description: The dangerous collection behind Russell's paradox.

