id: foundations.zermelo-fraenkel-set-theory-with-choice.proposition.zorn-equivalent-choice
kind: proposition
title: Zorn's lemma is equivalent to Choice over ZF

proposition_type: theorem

claim: |
  Over $\mathrm{ZF}$, the axiom of choice is equivalent to Zorn's lemma: if every chain in a partially ordered set has an upper bound, then the partially ordered set has a maximal element.

display_math:
  - latex: |
      \mathrm{AC}\iff
      \bigl(\forall P\,((\text{each chain in }P\text{ has an upper bound})
      \Rightarrow P\text{ has a maximal element})\bigr)
    description: Equivalence of choice and Zorn's lemma over ZF.

depends_on:
