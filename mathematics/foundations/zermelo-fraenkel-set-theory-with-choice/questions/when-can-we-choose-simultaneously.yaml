id: foundations.zermelo-fraenkel-set-theory-with-choice.question.when-can-we-choose-simultaneously
kind: question
title: When can choices be made simultaneously?

asks: |
  Given a family of nonempty sets, when may we assert that there is a function selecting one element from each set, even when no explicit selection rule is known?

display_math:
  - latex: |
      \{X_i:i\in I\},\quad X_i\neq\varnothing
      \quad\Longrightarrow\quad
      \exists f\,\forall i\,(f(i)\in X_i)\ ?
    description: The guiding question behind the axiom of choice.

