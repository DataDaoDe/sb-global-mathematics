id: foundations.zermelo-fraenkel-set-theory.definition.empty-set
kind: definition
title: Empty set axiom

definition_role: contextual
definition_style: axiomatic
scope: ZF axiom

defines:
  - foundations.zermelo-fraenkel-set-theory

depends_on:
  - foundations.set

statement: |
  The empty set axiom says that there is a set with no elements.

display_math:
  - latex: |
      \exists E\,\forall x\,(x\notin E)
    description: Existence of a set with no members.

source_refs:
  - source: source.zermelo-1908-grundlagen-mengenlehre
    locator: Axiom II
    note: Zermelo grouped existence of elementary sets with empty and singleton-like constructions.
  - source: source.jech-set-theory-third-millennium
    locator: Chapter 1
    note: Modern presentations often isolate the empty set axiom.
