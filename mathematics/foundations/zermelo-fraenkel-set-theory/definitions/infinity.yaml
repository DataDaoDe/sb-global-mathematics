id: foundations.zermelo-fraenkel-set-theory.definition.infinity
kind: definition
title: Infinity axiom

definition_role: contextual
definition_style: axiomatic
scope: ZF axiom

defines:
  - foundations.zermelo-fraenkel-set-theory

depends_on:
  - foundations.set

statement: |
  The infinity axiom says that there is a set containing the empty set and closed under the successor operation $x\mapsto x\cup\{x\}$.

display_math:
  - latex: |
      \exists I\,
      \bigl(\varnothing\in I\wedge
      \forall x\,(x\in I\Rightarrow x\cup\{x\}\in I)\bigr)
    description: Existence of an inductive set.

source_refs:
  - source: source.zermelo-1908-grundlagen-mengenlehre
    locator: Axiom VII
    note: Zermelo included infinity to secure the existence of an infinite set.
  - source: source.jech-set-theory-third-millennium
    locator: Chapter 1
    note: Standard modern formulation using inductive sets.
