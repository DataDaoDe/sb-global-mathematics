id: foundations.zermelo-fraenkel-set-theory.definition.pairing
kind: definition
title: Pairing axiom

definition_role: contextual
definition_style: axiomatic
scope: ZF axiom

defines:
  - foundations.zermelo-fraenkel-set-theory

depends_on:
  - foundations.set

statement: |
  The pairing axiom says that for any sets $a$ and $b$, there is a set whose elements are exactly $a$ and $b$.

display_math:
  - latex: |
      \forall a\,\forall b\,\exists p\,\forall x\,
      (x\in p\iff (x=a\vee x=b))
    description: Existence of the unordered pair $\{a,b\}$.

source_refs:
  - source: source.zermelo-1908-grundlagen-mengenlehre
    locator: Axiom II
    note: Pairing is part of the elementary set-existence principles in Zermelo's system.
  - source: source.jech-set-theory-third-millennium
    locator: Chapter 1
    note: Standard modern formulation of pairing.
