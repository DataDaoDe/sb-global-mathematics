id: foundations.zermelo-fraenkel-set-theory.definition.power-set
kind: definition
title: Power set axiom

definition_role: contextual
definition_style: axiomatic
scope: ZF axiom

defines:
  - foundations.zermelo-fraenkel-set-theory

depends_on:
  - foundations.set

statement: |
  The power set axiom says that for any set $A$, there is a set whose elements are exactly the subsets of $A$.

display_math:
  - latex: |
      \forall A\,\exists P\,\forall X\,
      (X\in P\iff \forall x\,(x\in X\Rightarrow x\in A))
    description: Existence of the power set $\mathcal{P}(A)$.

source_refs:
  - source: source.zermelo-1908-grundlagen-mengenlehre
    locator: Axiom IV
    note: Zermelo included the power set operation among the set-existence axioms.
  - source: source.jech-set-theory-third-millennium
    locator: Chapter 1
    note: Standard modern formulation of the power set axiom.
