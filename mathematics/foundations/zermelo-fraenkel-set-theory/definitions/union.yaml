id: foundations.zermelo-fraenkel-set-theory.definition.union
kind: definition
title: Union axiom

definition_role: contextual
definition_style: axiomatic
scope: ZF axiom

defines:
  - foundations.zermelo-fraenkel-set-theory

depends_on:
  - foundations.set

statement: |
  The union axiom says that for any set $A$, there is a set containing exactly the elements of elements of $A$.

display_math:
  - latex: |
      \forall A\,\exists U\,\forall x\,
      (x\in U\iff \exists Y\,(x\in Y\wedge Y\in A))
    description: Existence of the union $\bigcup A$.

source_refs:
  - source: source.zermelo-1908-grundlagen-mengenlehre
    locator: Axiom V
    note: Zermelo included union as a basic set-forming operation.
  - source: source.jech-set-theory-third-millennium
    locator: Chapter 1
    note: Standard modern formulation of the union axiom.
